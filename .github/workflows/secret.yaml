name: Secret Demo

on:
  push:

jobs:
  use-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Safe secret usage
        env:
          SECRET: ${{ secrets.SECRET }}
        run: |
          echo "Secret is safely used in runtime: $SECRET"

      - name: Required escaped syntax check
        run: echo "The secret is \${{ secrets.SECRET }}"
