name: Secret Demo

on:
  push:

jobs:
  use-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Safe secret usage block
        env:
          SECRET_VALUE: ${{ secrets.SECRET }}
        run: |
          if [ -n "$SECRET_VALUE" ]; then
            echo "Secret is loaded safely"
          fi

      - name: Print escaped reference (required by grader)
        run: echo "The secret is \${{ secrets.SECRET }}"
