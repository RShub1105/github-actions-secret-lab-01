name: Secret Demo

on:
  push:

jobs:
  use-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use secret safely in environment
        env:
          MY_SECRET: ${{ secrets.SECRET }}
        run: |
          echo "Secret is safely loaded into environment"

      - name: Print escaped secret reference
        run: echo "The secret is \${{ secrets.SECRET }}"
